<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a1628">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Todos">
<link rel="icon" type="image/svg+xml" href="/icon.svg">
<link rel="apple-touch-icon" href="/icon.svg">
<title>Todos - ZAO</title>
<style>
  :root{--bg:#0a1628;--panel:#0f1f36;--ink:#f5f4ed;--muted:#94a3b8;--gold:#f5a623;--line:rgba(255,255,255,.1);--green:#4ade80;--red:#f87171;--blue:#60a5fa;--violet:#a78bfa}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;padding:1rem;padding-top:max(1rem,env(safe-area-inset-top));padding-bottom:calc(max(1rem,env(safe-area-inset-bottom)) + 64px)}
  header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:.8rem}
  h1{font-size:1.4rem;font-weight:600}
  .count{color:var(--muted);font-size:.8rem}
  textarea{width:100%;background:var(--panel);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:.7rem;font:inherit;font-size:.95rem;min-height:70px;resize:vertical}
  textarea:focus{outline:none;border-color:var(--gold)}
  .add-row{display:flex;gap:.5rem;margin-top:.5rem;flex-wrap:wrap;align-items:center}
  .add-row select,.add-row input{background:var(--panel);color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:.5rem;font:inherit;font-size:.85rem}
  .add-row input{flex:1 1 150px}
  .add-row select{flex:0 0 auto}
  button{background:var(--gold);color:var(--bg);border:0;border-radius:6px;padding:.55rem .9rem;font-weight:600;font-size:.9rem;-webkit-appearance:none;cursor:pointer}
  button:active{background:#d38b11}
  button.ghost{background:transparent;color:var(--muted);border:1px solid var(--line);font-weight:500}
  button.ghost:active{border-color:var(--gold);color:var(--gold)}
  .hint{color:var(--muted);font-size:.7rem;margin-top:.3rem}

  .filters{margin:1.2rem 0 .8rem 0;padding:.7rem;border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.015)}
  .filters h2{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.5rem;font-weight:600}
  .filter-group{display:flex;gap:.3rem;overflow-x:auto;padding-bottom:.3rem;scrollbar-width:none;-webkit-overflow-scrolling:touch;margin-bottom:.4rem}
  .filter-group::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;padding:.3rem .65rem;font-size:.72rem;border-radius:999px;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer;-webkit-appearance:none;white-space:nowrap}
  .chip.active{background:var(--gold);color:var(--bg);border-color:var(--gold);font-weight:600}
  .chip.active.p0{background:var(--red);border-color:var(--red);color:#fff}
  .chip.active.p1{background:var(--gold);border-color:var(--gold)}
  .chip.active.p2{background:var(--blue);border-color:var(--blue);color:#fff}
  .chip.active.p3{background:var(--violet);border-color:var(--violet);color:#fff}
  .search{width:100%;background:var(--panel);color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:.5rem;font:inherit;font-size:.9rem}
  .clear-filters{color:var(--muted);font-size:.7rem;background:none;border:0;text-decoration:underline;padding:0;cursor:pointer}

  ul.todos{list-style:none;margin-top:.5rem}
  ul.todos li{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:8px;padding:.6rem .8rem;margin-bottom:.4rem;display:flex;gap:.55rem;align-items:flex-start}
  ul.todos li.done{opacity:.55}
  ul.todos li.done .text{text-decoration:line-through}
  .check{flex:0 0 auto;width:22px;height:22px;border:2px solid var(--line);border-radius:5px;cursor:pointer;margin-top:.1rem;display:flex;align-items:center;justify-content:center;background:transparent;-webkit-appearance:none}
  .check.checked{background:var(--green);border-color:var(--green)}
  .body{flex:1 1 auto;min-width:0}
  .text{color:var(--ink);font-size:.92rem;line-height:1.35;word-break:break-word}
  .meta{color:var(--muted);font-size:.7rem;margin-top:.2rem;display:flex;gap:.4rem;flex-wrap:wrap;align-items:center}
  .pri{font-weight:700;letter-spacing:.05em}
  .pri-P0{color:var(--red)}.pri-P1{color:var(--gold)}.pri-P2{color:var(--blue)}.pri-P3{color:var(--violet)}
  .tag{background:rgba(245,166,35,.1);color:var(--gold);padding:.05rem .35rem;border-radius:3px;font-size:.65rem}
  .row-actions{flex:0 0 auto;display:flex;gap:.3rem}
  .row-actions button{background:transparent;border:1px solid var(--line);color:var(--muted);padding:.25rem .5rem;font-size:.7rem;border-radius:5px}
  .row-actions button:active{color:var(--gold);border-color:var(--gold)}
  .row-actions .del:active{color:var(--red);border-color:var(--red)}

  .empty{color:var(--muted);text-align:center;padding:2rem 0;font-size:.9rem}

  /* Section headers for date grouping */
  .group-hdr{color:var(--muted);font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin:1rem 0 .4rem 0;padding:0 .2rem}
  .group-hdr:first-child{margin-top:.4rem}

  /* Select mode + bulk action bar */
  .select-toggle{background:transparent;color:var(--muted);border:1px solid var(--line);padding:.3rem .6rem;font-size:.75rem;border-radius:6px;font-weight:500}
  .select-toggle.on{background:var(--gold);color:var(--bg);border-color:var(--gold);font-weight:600}
  ul.todos.select-mode li{cursor:pointer;padding-right:.5rem}
  ul.todos.select-mode li.selected{background:rgba(245,166,35,.12);border-color:var(--gold)}
  ul.todos.select-mode .row-actions{display:none}
  ul.todos.select-mode .check{pointer-events:none}
  .bulk-bar{position:fixed;left:0;right:0;bottom:calc(max(0px,env(safe-area-inset-bottom)) + 60px);background:var(--panel);border-top:1px solid var(--line);padding:.7rem 1rem;display:flex;gap:.4rem;align-items:center;justify-content:space-between;transform:translateY(120%);transition:transform .18s ease;z-index:50;flex-wrap:wrap}
  .bulk-bar.show{transform:translateY(0)}
  .bulk-bar .bulk-count{color:var(--gold);font-weight:600;font-size:.85rem;flex:0 0 auto}
  .bulk-bar .bulk-actions{display:flex;gap:.35rem;flex-wrap:wrap}
  .bulk-bar button{padding:.45rem .75rem;font-size:.8rem}
  .bulk-bar button.ghost{background:transparent;color:var(--muted);border:1px solid var(--line);font-weight:500}
  .bulk-bar button.danger{background:var(--red);color:#fff}

  /* Stats strip */
  .stats{display:flex;gap:.6rem;margin:.3rem 0 .8rem;color:var(--muted);font-size:.72rem;flex-wrap:wrap}
  .stats b{color:var(--ink);font-weight:600}
  .stats .good{color:var(--green)}

  /* Inline edit */
  .text.editing{outline:1px solid var(--gold);outline-offset:2px;border-radius:4px;padding:.1rem .3rem;background:rgba(245,166,35,.06)}

  /* Undo toast */
  .undo-toast{position:fixed;left:50%;transform:translateX(-50%) translateY(120%);bottom:calc(max(0px,env(safe-area-inset-bottom)) + 80px);background:var(--panel);border:1px solid var(--gold);border-radius:999px;padding:.5rem 1rem;display:flex;gap:.8rem;align-items:center;font-size:.82rem;color:var(--ink);z-index:60;transition:transform .2s ease;max-width:92vw}
  .undo-toast.show{transform:translateX(-50%) translateY(0)}
  .undo-toast button{background:var(--gold);color:var(--bg);border:0;padding:.3rem .7rem;font-size:.78rem;border-radius:999px;font-weight:600}

  /* Chip count badge */
  .chip .n{opacity:.65;margin-left:.25rem;font-weight:500;font-size:.68rem}
  .chip.active .n{opacity:1}

  details.spam{margin-top:.8rem;background:rgba(245,166,35,.04);border:1px solid rgba(245,166,35,.25);border-radius:8px;padding:.6rem .8rem}
  details.spam summary{cursor:pointer;color:var(--gold);font-size:.85rem;font-weight:600}
  details.spam textarea{margin-top:.5rem;min-height:130px}
  details.spam .spam-hint{font-size:.7rem;color:var(--muted);margin-top:.3rem}
</style>
</head>
<body>
  <header>
    <h1>Todos</h1>
    <div style="display:flex;gap:.5rem;align-items:center">
      <span class="count" id="count"></span>
      <button type="button" class="select-toggle" id="selectToggle">Select</button>
    </div>
  </header>

  <div class="stats" id="stats"></div>

  <form id="addForm">
    <textarea id="text" placeholder="brain dump one todo..." required></textarea>
    <div class="add-row">
      <select id="priority">
        <option value="P0">P0</option>
        <option value="P1">P1</option>
        <option value="P2" selected>P2</option>
        <option value="P3">P3</option>
      </select>
      <select id="project">
        <option value="">no project</option>
        <option value="ZAOOS">ZAOOS</option>
        <option value="BetterCallZaal">BCZ</option>
        <option value="COC">COC</option>
        <option value="WaveWarZ">WaveWarZ</option>
        <option value="ZAOstock">ZAOstock</option>
      </select>
      <input id="tags" placeholder="#tags comma,separated">
      <button type="submit">Add</button>
    </div>
    <div class="hint">Tip: enter = add + stay on form. shift+enter = newline.</div>
  </form>

  <details class="spam">
    <summary>Bulk add (one per line)</summary>
    <textarea id="spam" placeholder="line 1&#10;line 2&#10;line 3"></textarea>
    <div class="add-row">
      <select id="spamPriority">
        <option value="P0">P0</option>
        <option value="P1">P1</option>
        <option value="P2" selected>P2</option>
        <option value="P3">P3</option>
      </select>
      <input id="spamTags" placeholder="#tags apply to all">
      <button id="spamBtn" type="button">Add all</button>
    </div>
    <div class="spam-hint">One todo per line. Blank lines skipped.</div>
  </details>

  <div class="filters">
    <h2>Status</h2>
    <div class="filter-group" id="statusChips">
      <button class="chip active" data-k="status" data-v="open">Open</button>
      <button class="chip" data-k="status" data-v="doing">Doing</button>
      <button class="chip" data-k="status" data-v="done">Done</button>
      <button class="chip" data-k="status" data-v="archived">Archived</button>
      <button class="chip" id="statusAll" type="button">All</button>
    </div>
    <h2>Priority</h2>
    <div class="filter-group" id="priorityChips">
      <button class="chip p0" data-k="priority" data-v="P0">P0</button>
      <button class="chip p1" data-k="priority" data-v="P1">P1</button>
      <button class="chip p2" data-k="priority" data-v="P2">P2</button>
      <button class="chip p3" data-k="priority" data-v="P3">P3</button>
    </div>
    <h2>Project</h2>
    <div class="filter-group" id="projectChips"></div>
    <h2>Tags</h2>
    <div class="filter-group" id="tagChips"></div>
    <h2>Search</h2>
    <input class="search" id="search" placeholder="search text, notes, tags...">
    <div style="margin-top:.5rem;display:flex;justify-content:space-between;align-items:center">
      <button type="button" class="clear-filters" id="clearFilters">clear filters</button>
      <select id="order" style="background:var(--panel);color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:.35rem;font-size:.75rem">
        <option value="priority">By priority</option>
        <option value="newest">Newest</option>
        <option value="oldest">Oldest</option>
      </select>
    </div>
  </div>

  <ul class="todos" id="list"></ul>
  <div class="empty" id="empty" style="display:none">No todos match these filters.</div>

  <div class="undo-toast" id="undoToast">
    <span id="undoMsg">Done</span>
    <button type="button" id="undoBtn">Undo</button>
  </div>

  <div class="bulk-bar" id="bulkBar">
    <span class="bulk-count" id="bulkCount">0 selected</span>
    <div class="bulk-actions">
      <button type="button" id="bulkDone">Mark done</button>
      <button type="button" class="ghost" id="bulkReopen">Reopen</button>
      <button type="button" class="ghost" id="bulkArchive">Archive</button>
      <button type="button" class="danger" id="bulkDelete">Delete</button>
      <button type="button" class="ghost" id="bulkClear">Cancel</button>
    </div>
  </div>

<script>
const filters = { status: ["open"], priority: [], project: null, tag: null, q: "", order: "priority" };
let allTags = [];
let total = 0;
let selectMode = false;
const selected = new Set();
let lastSnapshot = null;
let undoTimer = null;
const KNOWN_PROJECTS = ["ZAOOS", "BetterCallZaal", "COC", "WaveWarZ", "ZAOstock"];

function buildQuery() {
  const p = new URLSearchParams();
  for (const s of filters.status) p.append("status", s);
  for (const pr of filters.priority) p.append("priority", pr);
  if (filters.project) p.set("project", filters.project);
  if (filters.tag) p.set("tag", filters.tag);
  if (filters.q) p.set("q", filters.q);
  p.set("order", filters.order);
  return p.toString();
}

async function fetchAllForStats() {
  // Lightweight: fetch every status to compute counts + today/week done
  const res = await fetch("/api/todos?status=open&status=doing&status=done&status=archived", { headers: { "Accept": "application/json" } });
  if (!res.ok) return { todos: [] };
  return res.json();
}

function isSameDay(a, b) {
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}

function updateStats(all) {
  const now = new Date();
  const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
  const counts = { open: 0, doing: 0, done: 0, archived: 0, p0: 0, doneToday: 0, doneWeek: 0 };
  for (const t of all) {
    counts[t.status] = (counts[t.status] || 0) + 1;
    if (t.status === "open" && t.priority === "P0") counts.p0++;
    if (t.status === "done" && t.updated_at) {
      const u = new Date(t.updated_at);
      if (isSameDay(u, now)) counts.doneToday++;
      if (u > weekAgo) counts.doneWeek++;
    }
  }
  const stats = document.getElementById("stats");
  stats.innerHTML = `<span><b class="${counts.p0 ? 'good' : ''}">${counts.p0}</b> P0 open</span>` +
    `<span><b>${counts.open}</b> open total</span>` +
    `<span>Done <b class="good">${counts.doneToday}</b> today</span>` +
    `<span><b class="good">${counts.doneWeek}</b> this week</span>`;
  // Write chip counts
  const setCount = (selector, n) => {
    const el = document.querySelector(selector);
    if (!el) return;
    const existing = el.querySelector(".n");
    if (existing) existing.remove();
    const span = document.createElement("span");
    span.className = "n";
    span.textContent = n;
    el.appendChild(span);
  };
  setCount("#statusChips .chip[data-v='open']", counts.open);
  setCount("#statusChips .chip[data-v='doing']", counts.doing);
  setCount("#statusChips .chip[data-v='done']", counts.done);
  setCount("#statusChips .chip[data-v='archived']", counts.archived);
  // Priority counts (only for open)
  const priCounts = { P0: 0, P1: 0, P2: 0, P3: 0 };
  for (const t of all) if (t.status === "open") priCounts[t.priority || "P2"]++;
  setCount("#priorityChips .chip[data-v='P0']", priCounts.P0);
  setCount("#priorityChips .chip[data-v='P1']", priCounts.P1);
  setCount("#priorityChips .chip[data-v='P2']", priCounts.P2);
  setCount("#priorityChips .chip[data-v='P3']", priCounts.P3);
  // Project chips from real data (union of known + seen)
  const seenProjects = new Set(KNOWN_PROJECTS);
  for (const t of all) if (t.project) seenProjects.add(t.project);
  renderProjectChips(Array.from(seenProjects).sort(), all);
}

function renderProjectChips(projects, all) {
  const container = document.getElementById("projectChips");
  if (!container) return;
  container.innerHTML = "";
  const all0 = document.createElement("button");
  all0.className = "chip" + (!filters.project ? " active" : "");
  all0.textContent = "all";
  all0.addEventListener("click", () => { filters.project = null; renderProjectChips(projects, all); load(); });
  container.appendChild(all0);
  for (const p of projects) {
    const openCount = all.filter(t => t.project === p && t.status === "open").length;
    const btn = document.createElement("button");
    btn.className = "chip" + (filters.project === p ? " active" : "");
    btn.innerHTML = p + `<span class="n">${openCount}</span>`;
    btn.addEventListener("click", () => { filters.project = filters.project === p ? null : p; renderProjectChips(projects, all); load(); });
    container.appendChild(btn);
  }
}

function showUndo(msg, prevStates) {
  const toast = document.getElementById("undoToast");
  const msgEl = document.getElementById("undoMsg");
  msgEl.textContent = msg;
  lastSnapshot = prevStates;
  toast.classList.add("show");
  if (undoTimer) clearTimeout(undoTimer);
  undoTimer = setTimeout(() => { toast.classList.remove("show"); lastSnapshot = null; }, 5000);
}

async function undoLastAction() {
  if (!lastSnapshot) return;
  const snap = lastSnapshot;
  lastSnapshot = null;
  document.getElementById("undoToast").classList.remove("show");
  if (undoTimer) clearTimeout(undoTimer);
  // Restore each item's previous fields; deleted items cannot be undone (backend removed)
  await Promise.all(snap.filter(s => !s.deleted).map(s =>
    fetch("/api/todos/" + s.id, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ status: s.status, priority: s.priority })
    })
  ));
  const deletedCount = snap.filter(s => s.deleted).length;
  if (deletedCount > 0) {
    alert(`${deletedCount} deleted todo(s) cannot be restored (permanent delete).`);
  }
  load();
}

async function fetchTodos() {
  const res = await fetch("/api/todos?" + buildQuery(), { headers: { "Accept": "application/json" } });
  if (!res.ok) throw new Error("fetch failed " + res.status);
  return res.json();
}

function priClass(p) { return "pri pri-" + (p || "P2"); }

function groupLabel(iso) {
  if (!iso) return "Undated";
  const d = new Date(iso);
  const now = new Date();
  const oneDay = 24*60*60*1000;
  const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  const days = Math.floor((startOfToday - d.getTime()) / oneDay);
  if (days <= 0) return "Today";
  if (days === 1) return "Yesterday";
  if (days < 7) return "This week";
  if (days < 14) return "Last week";
  if (days < 30) return "This month";
  if (days < 90) return "Last 3 months";
  return "Older";
}

function render(data) {
  const list = document.getElementById("list");
  const empty = document.getElementById("empty");
  list.innerHTML = "";
  list.classList.toggle("select-mode", selectMode);
  total = data.total;
  document.getElementById("count").textContent = data.todos.length + " of " + total;
  if (!data.todos.length) { empty.style.display = ""; } else { empty.style.display = "none"; }
  // Group by date label, but only when sorting by newest/oldest to keep priority view clean
  const showGroups = filters.order === "newest" || filters.order === "oldest";
  let lastGroup = null;
  for (const t of data.todos) {
    if (showGroups) {
      const g = groupLabel(t.created_at);
      if (g !== lastGroup) {
        const hdr = document.createElement("div");
        hdr.className = "group-hdr";
        hdr.textContent = g;
        list.appendChild(hdr);
        lastGroup = g;
      }
    }
    const li = document.createElement("li");
    if (t.status === "done" || t.status === "archived") li.classList.add("done");
    if (selected.has(t.id)) li.classList.add("selected");
    if (selectMode) {
      li.addEventListener("click", (e) => {
        if (e.target.closest(".row-actions")) return;
        if (selected.has(t.id)) selected.delete(t.id); else selected.add(t.id);
        li.classList.toggle("selected");
        updateBulkBar();
      });
    }
    const check = document.createElement("button");
    check.type = "button";
    check.className = "check" + (t.status === "done" || selected.has(t.id) ? " checked" : "");
    check.title = "mark " + (t.status === "done" ? "open" : "done");
    check.textContent = (t.status === "done" || selected.has(t.id)) ? "\u2713" : "";
    check.style.color = "#0a1628";
    check.addEventListener("click", async (e) => {
      if (selectMode) return;
      e.stopPropagation();
      await fetch("/api/todos/" + t.id, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ status: t.status === "done" ? "open" : "done" }) });
      load();
    });
    li.appendChild(check);

    const body = document.createElement("div");
    body.className = "body";
    const text = document.createElement("div");
    text.className = "text";
    text.textContent = t.text;
    // Inline edit on double-tap (desktop dblclick + mobile-equivalent)
    if (!selectMode) {
      let tapTimer = null;
      const enterEdit = () => {
        if (text.isContentEditable) return;
        const orig = t.text;
        text.contentEditable = "true";
        text.classList.add("editing");
        text.focus();
        // place cursor at end
        const range = document.createRange();
        range.selectNodeContents(text);
        range.collapse(false);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
        const commit = async () => {
          text.contentEditable = "false";
          text.classList.remove("editing");
          const newText = text.textContent.trim();
          if (!newText || newText === orig) { text.textContent = orig; return; }
          await fetch("/api/todos/" + t.id, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text: newText })
          });
          load();
        };
        text.addEventListener("blur", commit, { once: true });
        text.addEventListener("keydown", (e) => {
          if (e.key === "Enter") { e.preventDefault(); text.blur(); }
          if (e.key === "Escape") { text.textContent = orig; text.blur(); }
        });
      };
      text.addEventListener("dblclick", (e) => { e.stopPropagation(); enterEdit(); });
      text.addEventListener("touchend", (e) => {
        if (tapTimer) { clearTimeout(tapTimer); tapTimer = null; e.preventDefault(); enterEdit(); return; }
        tapTimer = setTimeout(() => { tapTimer = null; }, 320);
      });
    }
    body.appendChild(text);
    const meta = document.createElement("div");
    meta.className = "meta";
    const pri = document.createElement("span"); pri.className = priClass(t.priority); pri.textContent = t.priority || "P2"; meta.appendChild(pri);
    if (t.project) { const pr = document.createElement("span"); pr.textContent = t.project; meta.appendChild(pr); }
    for (const tg of (t.tags || [])) { const tag = document.createElement("span"); tag.className = "tag"; tag.textContent = "#" + tg; meta.appendChild(tag); }
    const when = document.createElement("span"); when.textContent = relTime(t.created_at); meta.appendChild(when);
    body.appendChild(meta);
    li.appendChild(body);

    const actions = document.createElement("div");
    actions.className = "row-actions";
    const bump = document.createElement("button"); bump.textContent = "bump"; bump.title = "raise priority";
    bump.addEventListener("click", async () => {
      const next = t.priority === "P3" ? "P2" : t.priority === "P2" ? "P1" : t.priority === "P1" ? "P0" : "P0";
      await fetch("/api/todos/" + t.id, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ priority: next }) });
      load();
    });
    const spawn = document.createElement("button"); spawn.textContent = "spawn"; spawn.title = "open portal spawn with this text";
    spawn.addEventListener("click", () => {
      const u = new URL("https://portal.zaoos.com/");
      u.searchParams.set("prefill", t.text);
      u.searchParams.set("project", t.project || "ZAOOS");
      window.location.href = u.toString();
    });
    const del = document.createElement("button"); del.className = "del"; del.textContent = "x"; del.title = "delete";
    del.addEventListener("click", async () => {
      if (!confirm("delete this todo?")) return;
      await fetch("/api/todos/" + t.id, { method: "DELETE" });
      load();
    });
    actions.appendChild(bump); actions.appendChild(spawn); actions.appendChild(del);
    li.appendChild(actions);
    list.appendChild(li);
  }
  renderTagChips(data.tags);
}

function renderTagChips(tags) {
  allTags = tags || [];
  const container = document.getElementById("tagChips");
  const current = filters.tag;
  container.innerHTML = "";
  const all = document.createElement("button");
  all.className = "chip" + (!current ? " active" : "");
  all.textContent = "all";
  all.addEventListener("click", () => { filters.tag = null; load(); });
  container.appendChild(all);
  for (const t of allTags) {
    const b = document.createElement("button");
    b.className = "chip" + (current === t ? " active" : "");
    b.textContent = "#" + t;
    b.addEventListener("click", () => { filters.tag = current === t ? null : t; load(); });
    container.appendChild(b);
  }
}

function relTime(iso) {
  if (!iso) return "";
  const ms = Date.now() - new Date(iso).getTime();
  const s = Math.floor(ms / 1000);
  if (s < 60) return s + "s";
  const m = Math.floor(s / 60);
  if (m < 60) return m + "m";
  const h = Math.floor(m / 60);
  if (h < 24) return h + "h";
  return Math.floor(h / 24) + "d";
}

async function load() {
  try {
    const [data, statsData] = await Promise.all([fetchTodos(), fetchAllForStats()]);
    render(data);
    updateStats(statsData.todos || []);
  }
  catch (e) { document.getElementById("empty").textContent = "Error: " + e.message; document.getElementById("empty").style.display = ""; }
}

function updateBulkBar() {
  const bar = document.getElementById("bulkBar");
  const cnt = document.getElementById("bulkCount");
  if (!selectMode || selected.size === 0) {
    bar.classList.remove("show");
    cnt.textContent = "0 selected";
    return;
  }
  bar.classList.add("show");
  cnt.textContent = selected.size + " selected";
}

async function bulkPatch(statusValue) {
  const ids = Array.from(selected);
  if (!ids.length) return;
  // Snapshot current state so we can undo
  const all = await fetchAllForStats();
  const snap = (all.todos || []).filter(t => ids.includes(t.id)).map(t => ({ id: t.id, status: t.status, priority: t.priority }));
  await Promise.all(ids.map(id => fetch("/api/todos/" + id, {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ status: statusValue })
  })));
  selected.clear();
  updateBulkBar();
  showUndo(`${ids.length} todo(s) -> ${statusValue}`, snap);
  load();
}

async function bulkDelete() {
  const ids = Array.from(selected);
  if (!ids.length) return;
  if (!confirm("Delete " + ids.length + " todos? This cannot be undone.")) return;
  await Promise.all(ids.map(id => fetch("/api/todos/" + id, { method: "DELETE" })));
  selected.clear();
  updateBulkBar();
  // Delete cannot be undone through the API; the toast is informational only
  showUndo(`${ids.length} todo(s) deleted (permanent)`, ids.map(id => ({ id, deleted: true })));
  load();
}

document.getElementById("selectToggle").addEventListener("click", () => {
  selectMode = !selectMode;
  document.getElementById("selectToggle").classList.toggle("on", selectMode);
  document.getElementById("selectToggle").textContent = selectMode ? "Done" : "Select";
  if (!selectMode) { selected.clear(); }
  updateBulkBar();
  load();
});
document.getElementById("bulkDone").addEventListener("click", () => bulkPatch("done"));
document.getElementById("bulkReopen").addEventListener("click", () => bulkPatch("open"));
document.getElementById("bulkArchive").addEventListener("click", () => bulkPatch("archived"));
document.getElementById("bulkDelete").addEventListener("click", bulkDelete);
document.getElementById("bulkClear").addEventListener("click", () => {
  selected.clear();
  updateBulkBar();
  load();
});
document.getElementById("statusAll").addEventListener("click", () => {
  filters.status = ["open", "doing", "done", "archived"];
  document.querySelectorAll("#statusChips .chip[data-v]").forEach(el => el.classList.add("active"));
  load();
});
document.getElementById("undoBtn").addEventListener("click", undoLastAction);

document.querySelectorAll("#statusChips .chip, #priorityChips .chip").forEach(el => {
  el.addEventListener("click", () => {
    const k = el.dataset.k; const v = el.dataset.v;
    const arr = filters[k];
    const i = arr.indexOf(v);
    if (i >= 0) arr.splice(i, 1); else arr.push(v);
    el.classList.toggle("active");
    load();
  });
});

document.getElementById("clearFilters").addEventListener("click", () => {
  filters.status = ["open"]; filters.priority = []; filters.tag = null; filters.q = ""; filters.order = "priority";
  document.getElementById("search").value = "";
  document.querySelectorAll("#statusChips .chip").forEach(el => el.classList.toggle("active", el.dataset.v === "open"));
  document.querySelectorAll("#priorityChips .chip").forEach(el => el.classList.remove("active"));
  document.getElementById("order").value = "priority";
  load();
});

let searchTimer;
document.getElementById("search").addEventListener("input", (e) => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { filters.q = e.target.value; load(); }, 250);
});
document.getElementById("order").addEventListener("change", (e) => { filters.order = e.target.value; load(); });

document.getElementById("addForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const text = document.getElementById("text").value.trim();
  if (!text) return;
  const priority = document.getElementById("priority").value;
  const project = document.getElementById("project").value;
  const tags = document.getElementById("tags").value;
  await fetch("/api/todos", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ text, priority, project, tags }) });
  document.getElementById("text").value = "";
  document.getElementById("tags").value = "";
  document.getElementById("text").focus();
  load();
});

document.getElementById("text").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    document.getElementById("addForm").dispatchEvent(new Event("submit"));
  }
});

document.getElementById("spamBtn").addEventListener("click", async () => {
  const lines = document.getElementById("spam").value.split("\n").map(l => l.trim()).filter(Boolean);
  if (!lines.length) return;
  const priority = document.getElementById("spamPriority").value;
  const tags = document.getElementById("spamTags").value;
  const items = lines.map(text => ({ text, priority, tags }));
  await fetch("/api/todos", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ items }) });
  document.getElementById("spam").value = "";
  load();
});

load();
setInterval(load, 30000);
</script>
<script src="/dock.js" defer></script>
</body>
</html>
