drift_targets:
  - id: "zao-devz-runtime-mismatch"
    severity: "MEDIUM"
    issue: "Code in ZAOOS (bot/src/devz/), runs from cowork-zaodevz clone (~/migrated-cowork/...)"
    implication: "Updates to bot/src/devz/ not auto-deployed"
    question: "Intentional (Iman-owned, standalone)? Or integrate into ZAOOS fleet?"
    recommendation: "Clarify ownership + decide integrate-or-standalone"

  - id: "zol-dual-codebases"
    severity: "MEDIUM"
    issue: "v1 LIVE (~/zol/), v2 in review (~/zol-upgrade on VPS)"
    implication: "Two parallel codebases; unclear promotion path"
    question: "When does v2 replace v1? Where does v2 ship?"
    recommendation: "Document v2 ship date + promotion plan in memory"

  - id: "build-deploy-separation"
    severity: "LOW"
    issue: "Code in ~/zao-os (build branch), ZOE runs from ~/zao-bot-live (main branch only)"
    implication: "Feature branches do NOT auto-run; only merged main"
    recommendation: "Document this as intentional design choice (working as intended)"

  - id: "research-doc-decommission"
    severity: "LOW"
    issue: "Doc 601 + agent-design docs still reference openclaw/Composio/ZOE v2"
    implication: "Future readers may try to reopen closed decisions"
    recommendation: "Mark docs ARCHIVED, point to CLAUDE.md decommissioned list"

  - id: "bonfire-underutilized"
    severity: "LOW"
    issue: "Integrated into ZOE but described as DORMANT (blocked on labeling)"
    implication: "Knowledge doesn't persist to shared graph"
    recommendation: "Unblock labeling step, enable recap.ts -> Bonfire writes"

  - id: "imanagent-planned"
    severity: "LOW"
    issue: "cowork-zaodevz bot is slash-commands-only; imanagent (doc 650) still planned"
    implication: "ZAO Devz is not yet fully autonomous"
    recommendation: "Priority low; reference doc 650, Iman owns"
